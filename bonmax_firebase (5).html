<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ボンマックスアパレル 愛知プリント生産ライン管理システム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCRxS0g4XXs9A8pjGK5RuME15zm4IKqbgs",
  authDomain: "bonmax-production.firebaseapp.com",
  projectId: "bonmax-production",
  storageBucket: "bonmax-production.firebasestorage.app",
  messagingSenderId: "624370603686",
  appId: "1:624370603686:web:80445276cf51fa114bc667"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── Expose to global scope for use in non-module script ──
window._fbAuth = auth;
window._fbDb = db;
window._fbFns = {
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  signOut,
  onAuthStateChanged,
  doc, setDoc, getDoc, collection, onSnapshot, serverTimestamp
};
window._fbReady = true;

// ── Auth state listener ──
onAuthStateChanged(auth, async function(user) {
  if (user) {
    // Load user profile from Firestore
    const usnap = await getDoc(doc(db, 'users', user.uid));
    if (usnap.exists()) {
      const ud = usnap.data();
      window._currentFbUser = {uid: user.uid, email: user.email, co: ud.co, role: ud.role};
    } else {
      window._currentFbUser = {uid: user.uid, email: user.email, co: user.email, role: 'client'};
    }
    // Start real-time sync
    window._startSync && window._startSync();
  } else {
    window._currentFbUser = null;
    window._stopSync && window._stopSync();
    // Show login
    if (window._fbAppReady) {
      G.u = null; G.view = 'login'; render();
    }
  }
});
</script>
<style>

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#edeaf8;--sur:#fff;--sur2:#f4f2fb;--sur3:#eceaf6;
  --bd:#d5d2ea;--bd2:#b8b4d0;
  --tx:#1a1825;--tx2:#58566a;--tx3:#9896a8;
  --pr:#534AB7;--prl:#EEEDFE;--prd:#3C3489;
  --ok:#276010;--okb:#d4f0c0;
  --wn:#7a4400;--wnb:#fdebd0;
  --ng:#991111;--ngb:#fde8e8;
  --inf:#0f4f9a;--infb:#ddeeff;
  --tl:#0a5840;--tlb:#ccf0e4;
  --don:#eceae8;
  --row-bm:#f6f4ff;--row-ll:#f0faf6;--row-ot:#faf9f4;
}
html,body{height:100%;font-family:"Noto Sans JP",sans-serif;background:var(--bg);color:var(--tx);font-size:14px}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
/* HEADER */
.app-hd{flex-shrink:0;height:54px;background:linear-gradient(135deg,#2a2370 0%,#534AB7 55%,#6d65c8 100%);display:flex;align-items:center;justify-content:space-between;padding:0 20px;box-shadow:0 2px 10px rgba(40,30,150,.3)}
.hd-l{display:flex;align-items:center;gap:10px}
.hd-ico{width:32px;height:32px;background:rgba(255,255,255,.18);border-radius:9px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.25)}
.hd-ico svg{width:17px;height:17px;fill:#fff}
.hd-title{font-size:14px;font-weight:700;color:#fff;letter-spacing:.02em}
.hd-r{display:flex;align-items:center;gap:8px}
.ubadge{background:rgba(255,255,255,.18);color:#fff;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;border:1px solid rgba(255,255,255,.3)}
.abadge{background:#fbbf24;color:#6b3700;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700}
/* NAV */
.app-nav{flex-shrink:0;height:44px;background:var(--sur);border-bottom:2px solid var(--bd);display:flex;padding:0 20px}
.ntab{display:flex;align-items:center;padding:0 15px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:3px solid transparent;color:var(--tx2);transition:all .15s;white-space:nowrap;margin-bottom:-2px;user-select:none}
.ntab:hover{color:var(--pr);background:var(--sur2)}
.ntab.on{color:var(--pr);border-bottom-color:var(--pr);font-weight:700}
/* MONTH TABS */
.app-month{flex-shrink:0;height:44px;background:var(--sur2);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:6px;padding:0 20px}
.mtab{padding:5px 16px;font-size:12px;cursor:pointer;border-radius:20px;border:1px solid var(--bd2);background:var(--sur);color:var(--tx2);font-weight:500;transition:all .15s;user-select:none}
.mtab:hover{border-color:var(--pr);color:var(--pr)}
.mtab.on{background:var(--pr);color:#fff;border-color:var(--pr);font-weight:700}
/* BODY */
.app-body{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0}
.content{padding:16px 20px}
.content.sched-content{padding:10px 20px 0;display:flex;flex-direction:column;height:100%;overflow:hidden}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:none;transition:all .15s}
.btn-pr{background:var(--pr);color:#fff}.btn-pr:hover{background:var(--prd)}
.btn-sec{background:var(--sur);color:var(--tx);border:1px solid var(--bd2)}.btn-sec:hover{background:var(--sur2)}
.btn-ng{background:none;color:var(--ng);border:1px solid var(--ng)}.btn-ng:hover{background:var(--ngb)}
.btn-ok{background:var(--okb);color:var(--ok);border:1px solid #90c860}.btn-ok:hover{background:#c4e898}
.btn-sm{padding:4px 10px;font-size:11px}
/* SECTION */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-size:15px;font-weight:700}
.hint-bar{background:var(--prl);color:var(--prd);font-size:11px;padding:5px 12px;border-radius:7px;margin-bottom:10px;display:inline-flex;align-items:center;gap:6px;font-weight:500}
/* SUMMARY CARDS */
.sbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.scard{background:var(--sur);border:1px solid var(--bd);border-radius:10px;padding:12px 16px;flex:1;min-width:110px;border-left:4px solid var(--pr)}
.scard-l{font-size:11px;color:var(--tx2);font-weight:500}
.scard-v{font-size:20px;font-weight:700;margin-top:2px}
/* ORDERS TABLE */
.tbl-outer{border-radius:10px;border:1px solid var(--bd);overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.tbl-scroll{overflow:auto;max-height:calc(100vh - 240px)}
table.ord{width:100%;border-collapse:collapse;min-width:1000px}
table.ord thead th{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,#2a2370,#534AB7);color:#fff;font-size:11px;font-weight:700;padding:9px 10px;text-align:left;border-right:1px solid rgba(255,255,255,.12);white-space:nowrap}
table.ord td{padding:8px 10px;font-size:12px;border-bottom:1px solid var(--bd);vertical-align:middle}
table.ord tr:last-child td{border-bottom:none}
table.ord tr.row-bm td{background:var(--row-bm)}
table.ord tr.row-ll td{background:var(--row-ll)}
table.ord tr.row-ot td{background:var(--row-ot)}
table.ord tr.done td{background:var(--don)!important;color:var(--tx2)}
table.ord tr:not(.done):hover td{filter:brightness(.97)}
.drag-handle{cursor:grab;color:var(--tx3);font-size:15px;padding:2px 4px;user-select:none}
.drag-handle:active{cursor:grabbing}
tr.dragging{opacity:.35}
tr.drag-over td{border-top:3px solid var(--pr)!important}
.rank-b{background:var(--pr);color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
/* BADGES */
.sbadge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.s-done{background:var(--okb);color:var(--ok)}
.s-prog{background:var(--infb);color:var(--inf)}
.s-pend{background:var(--wnb);color:var(--wn)}
.cbadge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;border:1px solid}
.c-bm{background:#f0effe;color:var(--prd);border-color:#aea8e0}
.c-ll{background:var(--tlb);color:var(--tl);border-color:#60c0a0}
.c-ot{background:#f5f4ee;color:#5a5030;border-color:#c0bc9c}
.ok-lbl{color:var(--ok);font-weight:700;font-size:12px}
.ng-lbl{display:inline-flex;align-items:center;gap:3px;background:#e81c00;color:#fff;font-weight:700;font-size:11px;padding:3px 8px;border-radius:5px;cursor:pointer;animation:pulseRed 1.8s infinite;white-space:nowrap}
.ng-lbl:hover{background:#c01500}
@keyframes pulseRed{0%,100%{box-shadow:0 0 0 0 rgba(232,28,0,.45)}55%{box-shadow:0 0 0 5px rgba(232,28,0,0)}}
.dots{cursor:pointer;color:var(--tx2);padding:3px 7px;border-radius:5px;font-size:16px;font-weight:700}
.dots:hover{background:var(--sur3);color:var(--pr)}
.nm-link{cursor:pointer;color:var(--pr);font-weight:600;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px}
.nm-link:hover{color:var(--prd)}
.doc-badge{font-size:9px;background:var(--prl);color:var(--prd);border:1px solid #aea8e0;border-radius:3px;padding:1px 4px;margin-left:3px;vertical-align:middle}
/* SCHEDULE GANTT */
.sched-outer{border-radius:10px;border:1px solid var(--bd);overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.07);flex:1;min-height:0;display:flex;flex-direction:column}
.sched-scroll{overflow:auto;flex:1;min-height:0}
table.sch{border-collapse:collapse;background:var(--sur);width:100%}
table.sch th{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,#2a2370,#534AB7);color:#fff;font-size:10px;font-weight:700;padding:5px 2px;text-align:center;border-right:1px solid rgba(255,255,255,.12);white-space:nowrap}
table.sch th.nc{text-align:left;min-width:260px;width:260px;position:sticky;left:0;top:0;z-index:20;padding:5px 10px;font-size:11px}
table.sch th.qty-col{min-width:62px;width:62px;position:sticky;left:260px;top:0;z-index:19;border-right:2px solid rgba(255,255,255,.25)}
table.sch td{padding:2px 1px;text-align:center;border-bottom:1px solid var(--bd);border-right:1px solid var(--bd);font-size:10px;min-width:48px;height:28px;vertical-align:middle}
table.sch td.nc{text-align:left;padding:5px 10px;position:sticky;left:0;background:var(--sur);font-size:12px;z-index:5;min-width:260px;width:260px;border-right:1px solid var(--bd);font-weight:500}
table.sch td.qty-col{text-align:right;padding:3px 6px;position:sticky;left:260px;background:var(--sur);font-size:11px;font-weight:700;z-index:4;min-width:62px;width:62px;border-right:2px solid var(--bd);color:var(--pr)}
table.sch tr.row-bm td.nc,table.sch tr.row-bm td.qty-col{background:var(--row-bm)}
table.sch tr.row-ll td.nc,table.sch tr.row-ll td.qty-col{background:var(--row-ll)}
table.sch tr.row-ot td.nc,table.sch tr.row-ot td.qty-col{background:var(--row-ot)}
table.sch tr.done td.nc,table.sch tr.done td.qty-col,table.sch tr.done td{background:var(--don)!important;color:var(--tx2)}
.tcol{background:rgba(83,74,183,.07)!important}
.wcol{background:#f7f5f0!important}
.gantt-bar{height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;overflow:hidden;white-space:nowrap;cursor:grab;margin:0 1px;user-select:none;transition:opacity .15s}
.gantt-bar:hover{opacity:.82}
.gantt-bar.dragging-bar{opacity:.4;cursor:grabbing}
.drop-target td{background:rgba(83,74,183,.18)!important}
.gb-bm{background:#9890e0;color:#fff;border:1px solid #6860c0}
.gb-ll{background:#44c898;color:#fff;border:1px solid #28a878}
.gb-ot{background:#a8a488;color:#fff;border:1px solid #888070}
.gb-dn{background:#80cc50;color:#1a4800;border:1px solid #58a030}
.gantt-bar.br-s{border-radius:4px 0 0 4px}
.gantt-bar.br-m{border-radius:0}
.gantt-bar.br-e{border-radius:0 4px 4px 0}
.gantt-bar.br-o{border-radius:4px}
.dl-mark{display:inline-block;width:3px;height:22px;background:#cc0808;border-radius:2px;opacity:.75}
.cap-row td{background:#ece9ff!important;font-size:10px;font-weight:700;color:var(--prd)}
.cap-row td.nc{font-size:11px;font-weight:700}
.cap-ov{background:var(--ngb)!important;color:var(--ng)!important}
.cap-wn{background:#fff0d8!important;color:#7a4400!important}
/* LEGEND */
.legend{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--tx2);margin-bottom:10px;align-items:center}
.lg{display:flex;align-items:center;gap:4px}
.lb{width:13px;height:13px;border-radius:3px}
/* CAPACITY */
.cap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:10px}
.cap-card{background:var(--sur);border:1px solid var(--bd);border-radius:10px;padding:12px;text-align:center;transition:all .15s;border-top:4px solid var(--bd2)}
.cap-card.editable{cursor:pointer}
.cap-card.editable:hover{border-color:var(--pr);border-top-color:var(--pr)}
.cap-card.tc2{border-top-color:var(--pr);border-color:var(--pr)}
.cap-dt{font-size:11px;color:var(--tx2);font-weight:600;margin-bottom:3px}
.cap-n{font-size:21px;font-weight:700}
.cap-u{font-size:11px;color:var(--tx3);margin-top:2px}
.cap-bar-w{height:5px;background:var(--bd);border-radius:3px;margin-top:8px}
.cap-fill{height:5px;border-radius:3px;background:var(--pr)}
.cap-fill.wn{background:#e06800}
.cap-fill.ov{background:var(--ng)}
.cap-in{width:80px;padding:4px 8px;border:2px solid var(--pr);border-radius:7px;font-size:18px;font-weight:700;text-align:center;font-family:inherit}
.cap-hint{font-size:10px;color:var(--tx3);margin-top:3px}
/* MODAL OVERLAY */
.mov{position:fixed;inset:0;background:rgba(15,10,40,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.mbox{background:var(--sur);border-radius:14px;width:680px;max-width:100%;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 70px rgba(0,0,0,.25);overflow:hidden}
.mhd{background:linear-gradient(135deg,#2a2370,#534AB7);color:#fff;padding:15px 22px;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mclose{background:none;border:none;color:rgba(255,255,255,.8);font-size:20px;cursor:pointer;line-height:1;padding:0 4px}
.mclose:hover{color:#fff}
.mbody{padding:18px 22px;overflow-y:auto;flex:1}
.mfoot{padding:12px 22px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--sur2)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
.fg2 .full{grid-column:1/-1}
.fg{margin-bottom:0}
.fl{font-size:12px;color:var(--tx2);margin-bottom:4px;display:block;font-weight:600}
.fi{width:100%;padding:8px 11px;border:1.5px solid var(--bd);border-radius:8px;font-size:13px;background:var(--sur);color:var(--tx);font-family:inherit;transition:border-color .15s}
.fi:focus{outline:none;border-color:var(--pr);box-shadow:0 0 0 3px rgba(83,74,183,.10)}
.fs{width:100%;padding:8px 11px;border:1.5px solid var(--bd);border-radius:8px;font-size:13px;background:var(--sur);color:var(--tx);font-family:inherit;cursor:pointer}
.fs:focus{outline:none;border-color:var(--pr)}
/* SCHED INPUT MODAL */
.sdbox{background:var(--sur);border-radius:14px;width:700px;max-width:100%;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 20px 70px rgba(0,0,0,.25);overflow:hidden}
.sddg{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.sdrow{display:flex;flex-direction:column;gap:3px;background:var(--sur2);border-radius:7px;padding:7px 7px 5px;border:1.5px solid var(--bd);transition:border-color .15s}
.sdrow.has-v{border-color:var(--pr);background:var(--prl)}
.sdrow.is-we{opacity:.38}
.sdlbl{font-size:11px;font-weight:700;color:var(--tx2)}
.sdin{width:100%;padding:5px 5px;border:1.5px solid var(--bd2);border-radius:5px;font-size:13px;font-weight:700;font-family:inherit;text-align:right;background:var(--sur)}
.sdin:focus{outline:none;border-color:var(--pr)}
.sdin:disabled{background:var(--sur2);color:var(--tx3)}
.sd-cap{font-size:9px;color:var(--tx3);margin-top:1px}
/* CAP BULK */
.cb-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.cb-item{display:flex;flex-direction:column;gap:3px}
.cb-lbl{font-size:11px;color:var(--tx2);font-weight:600}
.cb-in{width:100%;padding:7px 8px;border:1.5px solid var(--bd);border-radius:7px;font-size:13px;font-weight:700;text-align:center;font-family:inherit}
.cb-in:focus{outline:none;border-color:var(--pr)}
/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-hd{text-align:center;font-size:11px;font-weight:700;padding:4px;color:var(--tx2)}
.cal-day{text-align:center;padding:6px 3px;border-radius:7px;border:1.5px solid var(--bd);cursor:pointer;font-size:12px;transition:all .15s;background:var(--sur);min-height:36px;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none}
.cal-day:hover{border-color:var(--pr)}
.cal-day.hol{background:#fde8e8;color:var(--ng);border-color:#e88;font-weight:700}
.cal-day.wsat{color:var(--inf);font-weight:600}
.cal-day.wsun{color:var(--ng);font-weight:600}
.cal-day.empty{visibility:hidden}
.cal-day.td{border-color:var(--pr);background:var(--prl);font-weight:700}
/* DOC VIEWER */
.doc-viewer{background:var(--sur);border-radius:14px;width:820px;max-width:100%;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 20px 70px rgba(0,0,0,.25);overflow:hidden}
/* SETTINGS */
.setting-row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--bd)}
/* LOGIN */
.lwrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#2a2370 0%,#534AB7 50%,#7068c8 100%)}
.lcard{background:var(--sur);border-radius:16px;padding:40px 36px;width:380px;box-shadow:0 12px 50px rgba(0,0,0,.28)}
.llogo{text-align:center;margin-bottom:28px}
.lico{width:50px;height:50px;background:var(--pr);border-radius:13px;margin:0 auto 13px;display:flex;align-items:center;justify-content:center}
.lico svg{width:26px;height:26px;fill:#fff}
.lmain{font-size:17px;font-weight:700}
.lsub{font-size:11px;color:var(--tx2);margin-top:4px}
.lfg{margin-bottom:12px}
.lfl{font-size:12px;color:var(--tx2);margin-bottom:4px;display:block;font-weight:600}
.lfi{width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:8px;font-size:13px;font-family:inherit;transition:border-color .15s}
.lfi:focus{outline:none;border-color:var(--pr);box-shadow:0 0 0 3px rgba(83,74,183,.10)}
.lbtn2{width:100%;background:var(--pr);color:#fff;border:none;padding:12px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;transition:opacity .15s}
.lbtn2:hover{opacity:.87}
.lsw{text-align:center;margin-top:14px;font-size:12px;color:var(--tx2)}
.lsw span{color:var(--pr);cursor:pointer;font-weight:600}
.lerr{color:var(--ng);font-size:12px;margin-top:7px;text-align:center;min-height:15px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

/* Firebase loading overlay */
.fb-loading{position:fixed;inset:0;background:linear-gradient(135deg,#2a2370,#534AB7);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff}
.fb-loading-ico{font-size:48px;margin-bottom:16px;animation:spin 1.5s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.fb-loading-txt{font-size:16px;font-weight:700;letter-spacing:.05em;opacity:.9}
.fb-loading-sub{font-size:12px;opacity:.6;margin-top:6px}

function h(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function el(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt!==undefined)e.textContent=txt;return e;}
function on(e,ev,fn){e.addEventListener(ev,fn);return e;}

function getDays(mo){
  var m=parseInt(mo),dn=['日','月','火','水','木','金','土'],arr=[];
  for(var d=1;d<=new Date(2026,m,0).getDate();d++){
    var dt=new Date(2026,m-1,d),w=dt.getDay(),key='2026/'+m+'/'+d;
    arr.push({d:d,w:w,key:key,wn:dn[w],we:w===0||w===6||!!G.holidays[key]});
  }
  return arr;
}
function getCap(k){return G.capMap[k]!==undefined?G.capMap[k]:G.capDefault;}
function dlKey(o){
  var d=o.dl||'';if(!d||!/^\d+\/\d+$/.test(d))return null;
  var p=d.split('/');return '2026/'+p[0]+'/'+p[1];
}
function filterMo(orders,mt){
  var m=parseInt(mt);
  return orders.filter(function(o){
    var d=o.dl||o.sd||'';if(!d)return mt==='4';
    return parseInt(d.split('/')[0])===m;
  });
}
function sortOrders(os){
  var r={inprogress:1,pending:2,done:3};
  return os.slice().sort(function(a,b){
    var sr=(r[a.st]||2)-(r[b.st]||2);
    return sr!==0?sr:(a.rank||999)-(b.rank||999);
  });
}
function canSee(u,o){return u&&(u.role==='admin'||o.cl===u.co);}
function slbl(s){
  if(s==='done')return{t:'完了',c:'s-done'};
  if(s==='inprogress')return{t:'進行中',c:'s-prog'};
  return{t:'予定',c:'s-pend'};
}

}

// ==================== AUTO SCHEDULE ====================
function autoSched(orders,days){
  var wd=days.filter(function(d){return !d.we;}),cl={};
  wd.forEach(function(d){
    var used=0;
    orders.forEach(function(o){var ms=G.mSched[o.id];if(ms&&ms[d.key])used+=parseInt(ms[d.key])||0;});
    cl[d.key]=Math.max(0,getCap(d.key)-used);
  });
  var res={};
  var pend=orders.filter(function(o){return o.st!=='done'&&!G.mSched[o.id];})
    .map(function(o){var dk=dlKey(o),di=dk?wd.findIndex(function(d){return d.key===dk;}):-1;return{o:o,dk:dk,di:di,units:o.qty||0};})
    .sort(function(a,b){return a.di!==b.di?a.di-b.di:(a.o.rank||999)-(b.o.rank||999);});
  pend.forEach(function(p){
    if(p.units<=0)return;
    var sc={},rem=p.units,elig=p.di>=0?wd.slice(0,p.di+1):wd;
    for(var i=0;i<elig.length&&rem>0;i++){var d=elig[i],av=cl[d.key]||0;if(!av)continue;var a=Math.min(av,rem);sc[d.key]=a;cl[d.key]-=a;rem-=a;}
    if(rem>0){for(var i=0;i<wd.length&&rem>0;i++){var d=wd[i];if(sc[d.key])continue;var av=cl[d.key]||0;if(!av)continue;var a=Math.min(av,rem);sc[d.key]=a;cl[d.key]-=a;rem-=a;}}
    if(Object.keys(sc).length)res[p.o.id]=sc;
  });
  return res;
}
function getMerged(o,key,as,lineKey){
  // lineKey: optional 'F','B','A' for split-line override
  var sk=lineKey?(o.id+'_'+lineKey):null;
  if(sk&&G.mSched[sk])return G.mSched[sk][key]||0;
  var ms=G.mSched[o.id];if(ms)return ms[key]||0;
  return(as[o.id]||{})[key]||0;
}

// ==================== CSV ====================
function dlCSV(rows,fname){
  var bom='\uFEFF',csv=bom+rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download=fname;a.click();
}
function csvOrders(){
  var sorted=sortOrders(filterMo(G.orders,G.mt));
  var hd=['順位','客先','案件名','品番','数量','F','B','袖','TAS合計','ボディ','納期','出荷','状態','備考'];
  dlCSV([hd].concat(sorted.map(function(o){return[o.rank,o.cl,o.nm,o.bn,o.qty,o.pF,o.pB,o.pA,o.pts,o.bo?'着荷済':'未着',o.dl,o.sd,slbl(o.st).t,o.nt];})),'案件一覧_'+G.mt+'月.csv');
}
function csvSched(){
  var days=getDays(G.mt),allO=sortOrders(filterMo(G.orders,G.mt)),as=autoSched(allO,days);
  var hd=['案件名','客先','納期'].concat(days.map(function(d){return d.d+'日('+d.wn+')';}));
  dlCSV([hd].concat(allO.map(function(o){return[o.nm,o.cl,o.dl].concat(days.map(function(d){return getMerged(o,d.key,as)||'';}));})),'スケジュール_'+G.mt+'月.csv');
}

    lg.appendChild(lb);lg.appendChild(el('span','',lc.lbl));leg.appendChild(lg);

  var dlb=el('div','');dlb.style.cssText='background:#cc0808;border-radius:2px;width:4px;height:12px';dlg.appendChild(dlb);dlg.appendChild(el('span','','納期'));leg.appendChild(dlg);

  leg.appendChild(ci);
  cont.appendChild(leg);

  // ── Table wrapper ──
  var outer=el('div','sched-outer');
  var scroll=el('div','sched-scroll');

  // ── Dynamic column width ──
  // Fixed columns: name=220px, qty=60px → total 280px
  // Remaining = container width - 280 - scrollbar(8) ≈ window.innerWidth - 40(padding) - 280 - 8
  var fixedW=280;
  var availW=Math.max(200,(window.innerWidth||1200)-40-fixedW-10);
  // Weekdays only for gantt, but we show all days including weekends
  // day cell width = availW / days.length (min 22px)
  var dayW=Math.max(22,Math.floor(availW/days.length));

  var tbl=document.createElement('table');
  tbl.className='sch';
  tbl.style.cssText='table-layout:fixed;width:'+(fixedW+dayW*days.length)+'px';

  var cg=el('colgroup');

  days.forEach(function(){
    var c=el('col');c.style.width=dayW+'px';cg.appendChild(c);
  });
  tbl.appendChild(cg);

  // ── THEAD ──
  var thead=el('thead');
  var hr=el('tr');
  var th0=el('th','nc','案件名');hr.appendChild(th0);
  var thq=el('th','qty-col','数量');hr.appendChild(thq);
  days.forEach(function(d){
    var th=el('th','');
    if(d.key===TK)th.classList.add('tcol');else if(d.we)th.classList.add('wcol');
    if(d.w===0)th.style.color='#ffaaaa';else if(d.w===6)th.style.color='#aaccff';
    th.innerHTML=d.d+'<br><span style="font-size:7px;opacity:.8">'+d.wn+'</span>';
    hr.appendChild(th);
  });

  var cr=el('tr','cap-row');
  cr.appendChild(el('td','nc','キャパ残（枚）'));
  cr.appendChild(el('td','qty-col',''));
  days.forEach(function(d){
    var td=el('td','');
    if(d.we){td.classList.add('wcol');td.style.background='var(--sur2)';}
    else{
      var cp=getCap(d.key),us=upd[d.key]||0,rm=cp-us,pct=cp>0?Math.round(us/cp*100):0;
      if(pct>=100)td.classList.add('cap-ov');else if(pct>=80)td.classList.add('cap-wn');
      td.textContent=rm;td.title=d.d+'日 上限'+cp+' 使用'+us;
    }
    cr.appendChild(td);
  });
  thead.appendChild(cr);
  tbl.appendChild(thead);

  // ── Drag state (single global per table) ──
  var DS={active:false,oid:null,offset:0,lineKey:null};

  // ── Helpers ──
  function buildCellMapFromSched(schedMap){
    var spans=[],cur=null;
    days.forEach(function(d,i){
      var q=schedMap[d.key]||0;
      if(q>0){if(!cur)cur={si:i,ei:i,qty:q};else{cur.ei=i;cur.qty+=q;}}
      else if(cur){spans.push(cur);cur=null;}
    });
    if(cur)spans.push(cur);
    var cm={};
    spans.forEach(function(sp){
      for(var i=sp.si;i<=sp.ei;i++){
        var t=i===sp.si&&i===sp.ei?'o':i===sp.si?'s':i===sp.ei?'e':'m';
        cm[days[i].key]={type:t,qty:sp.qty};
      }
    });
    return cm;
  }

  function buildCellMap(o,as2){
    var spans=[],cur=null;
    days.forEach(function(d,i){
      var q=getMerged(o,d.key,as2);
      if(q>0){if(!cur)cur={si:i,ei:i,qty:q};else{cur.ei=i;cur.qty+=q;}}
      else if(cur){spans.push(cur);cur=null;}
    });
    if(cur)spans.push(cur);
    var cm={};
    spans.forEach(function(sp){
      for(var i=sp.si;i<=sp.ei;i++){
        var t=i===sp.si&&i===sp.ei?'o':i===sp.si?'s':i===sp.ei?'e':'m';
        cm[days[i].key]={type:t,qty:sp.qty};
      }
    });
    return cm;
  }

  function getCurrentSchedMap(oid,lineKey){
    // lineKey: 'F','B','A' or null
    var sk=lineKey?(oid+'_'+lineKey):null;
    if(sk&&G.mSched[sk])return JSON.parse(JSON.stringify(G.mSched[sk]));
    if(!lineKey&&G.mSched[oid])return JSON.parse(JSON.stringify(G.mSched[oid]));
    var o=G.orders.find(function(x){return x.id===oid;});if(!o)return{};
    var a2=autoSched([o],days);
    var base=JSON.parse(JSON.stringify((a2[oid]||{})));
    if(lineKey){
      // Scale auto map to this line's proportion
      var totalLocs2=o.pF+o.pB+o.pA;
      var locs=lineKey==='F'?o.pF:lineKey==='B'?o.pB:o.pA;
      if(totalLocs2>0&&locs>0){
        var scaled={};
        Object.keys(base).forEach(function(k){scaled[k]=Math.round((base[k]||0)*locs/totalLocs2);});
        return scaled;
      }
    }
    return base;
  }

  function applyMove(oid,dropWdIdx,lineKey){
    var curMap=getCurrentSchedMap(oid,lineKey);
    var occ=wdArr.filter(function(d){return curMap[d.key]>0;});
    if(!occ.length)return;
    var newStart=Math.max(0,Math.min(wdArr.length-occ.length, dropWdIdx - DS.offset));
    var ns={};
    occ.forEach(function(d,i){var nd=wdArr[newStart+i];if(nd)ns[nd.key]=curMap[d.key]||1;});
    var sk=lineKey?(oid+'_'+lineKey):null;
    if(sk)G.mSched[sk]=ns;else G.mSched[oid]=ns;
  }

  // ── Build gantt row ──
  function buildGanttRow(o,v,dn,cc,cellMap2,dkey2,subLabel,barCls2,isFirst,lineKey){
    var tr=el('tr','');tr.className=dn?'done':cc.row;

    // Name cell
    var nc=el('td','nc');
    if(isFirst){
      var nmtxt=v?(o.nm.length>26?o.nm.substring(0,26)+'…':o.nm):'他社案件';
      var nmsp=el('span','',nmtxt);
      if(!v)nmsp.style.cssText='color:var(--tx3);font-style:italic';
      if(adm&&v){nc.style.cursor='pointer';on(nc,'dblclick',function(oid){return function(){G.sid=oid;G.ssM=true;render();};}(o.id));}
      nc.appendChild(nmsp);
      if(v&&!o.bo&&o.st!=='done'){
        var wb=el('span','');wb.style.cssText='font-size:9px;background:#e81c00;color:#fff;border-radius:3px;padding:1px 4px;margin-left:3px;font-weight:700;vertical-align:middle';
        wb.textContent='未着';nc.appendChild(wb);
      }
      if(v&&o.splitLines&&(o.pF||o.pB||o.pA)){
        var slb=el('span','');slb.style.cssText='font-size:9px;background:var(--tlb);color:var(--tl);border:1px solid #60c0a0;border-radius:3px;padding:1px 4px;margin-left:3px;vertical-align:middle';
        slb.textContent='分割';nc.appendChild(slb);
      }
    } else {
      var sub=el('span','',subLabel);sub.style.cssText='font-size:10px;color:var(--tx3);padding-left:14px;font-weight:600';nc.appendChild(sub);
    }
    tr.appendChild(nc);

    // Qty cell
    var qtd=el('td','qty-col');
    if(isFirst&&v)qtd.textContent=o.qty.toLocaleString();
    tr.appendChild(qtd);

    // Day cells
    days.forEach(function(d){
      var wdIdx=d.we?-1:wdArr.findIndex(function(w){return w.key===d.key;});
      var td=el('td','');
      if(d.key===TK)td.classList.add('tcol');else if(d.we)td.classList.add('wcol');
      // Store data for drag delegation
      td.dataset.oid=o.id;
      td.dataset.wdIdx=wdIdx;

      var info=cellMap2[d.key];
      if(info){
        var br=info.type==='o'?'br-o':info.type==='s'?'br-s':info.type==='e'?'br-e':'br-m';
        var bar=el('div','gantt-bar '+barCls2+' '+br);
        bar.title=v?(o.nm+' '+info.qty+'枚'+(subLabel?' ['+subLabel+']':'')):'' ;
        // Mark bar cells for drag identification
        if(adm&&v&&(isFirst||lineKey)){
          bar.draggable='true';
          bar.dataset.oid=o.id;
          bar.dataset.wdIdx=wdIdx;
          if(lineKey)bar.dataset.lineKey=lineKey;
        }
        td.appendChild(bar);
      } else if(isFirst&&dkey2===d.key){
        var dm=el('span','dl-mark');dm.title='納期: '+o.dl;td.appendChild(dm);
      }
      tr.appendChild(td);
    });
    return tr;
  }

  // ── TBODY ──
  var tbody=el('tbody');
  allO.forEach(function(o){
    var v=canSee(u,o),dn=o.st==='done',cc=clCls(o.cl);
    var dkey=dlKey(o),barCls=dn?'gb-dn':cc.bar,cellMap=buildCellMap(o,as);
    if(!o.splitLines||!v||(o.pF===0&&o.pB===0&&o.pA===0)){
      // Single row — lineKey=null
      tbody.appendChild(buildGanttRow(o,v,dn,cc,cellMap,dkey,'',barCls,true,null));
    } else {
      // Split lines — each gets its own lineKey ('F','B','A')
      var lines=[],totalLocs=o.pF+o.pB+o.pA;
      if(o.pF>0)lines.push({lbl:'F（前）×'+o.pF,locs:o.pF,lk:'F'});
      if(o.pB>0)lines.push({lbl:'B（後）×'+o.pB,locs:o.pB,lk:'B'});
      if(o.pA>0)lines.push({lbl:'袖×'+o.pA,locs:o.pA,lk:'A'});
      lines.forEach(function(ln,li){
        // Build cellMap for this line: use its own mSched entry if exists, else scale from auto
        var lKey=o.id+'_'+ln.lk;
        var sm2;
        if(G.mSched[lKey]){
          sm2=buildCellMapFromSched(G.mSched[lKey]);
        } else {
          sm2={};
          var autoMap=(as[o.id]||{});
          // If parent has manual sched, use that scaled; else use auto scaled
          var base=G.mSched[o.id]||autoMap;
          Object.keys(base).forEach(function(k){
            if(base[k]>0){
              var idx=days.findIndex(function(d){return d.key===k;});
              if(idx<0)return;
              // rebuild span type
              var prev=base[days[idx-1]&&days[idx-1].key]>0,next=base[days[idx+1]&&days[idx+1].key]>0;
              var t=prev&&next?'m':!prev&&next?'s':prev&&!next?'e':'o';
              sm2[k]={type:t,qty:Math.round(base[k]*ln.locs/totalLocs)};
            }
          });
        }
        tbody.appendChild(buildGanttRow(o,v,dn,cc,sm2,dkey,ln.lbl,barCls,li===0,ln.lk));
      });
    }
  });
  tbl.appendChild(tbody);

  // ── Drag events: delegated on the TABLE (single listener) ──
  if(adm){
    on(tbl,'dragstart',function(e){
      var bar=e.target.closest('.gantt-bar[draggable]');
      if(!bar)return;
      var oid=parseInt(bar.dataset.oid);
      var barWdIdx=parseInt(bar.dataset.wdIdx);
      var lk=bar.dataset.lineKey||null;
      var curMap=getCurrentSchedMap(oid,lk);
      var firstOccIdx=wdArr.findIndex(function(w){return curMap[w.key]>0;});
      DS.active=true;
      DS.oid=oid;
      DS.lineKey=lk;
      DS.offset=(firstOccIdx>=0&&barWdIdx>=0)?(barWdIdx-firstOccIdx):0;
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',String(oid)+(lk?'_'+lk:''));
      setTimeout(function(){bar.classList.add('dragging-bar');},0);
    });

    on(tbl,'dragover',function(e){
      if(!DS.active)return;
      var td=e.target.closest('td');
      if(!td)return;
      var oid=parseInt(td.dataset.oid);
      if(oid!==DS.oid)return;
      var wdIdx=parseInt(td.dataset.wdIdx);
      if(wdIdx<0)return;
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      document.querySelectorAll('.drop-target').forEach(function(r){r.classList.remove('drop-target');});
      td.closest('tr').classList.add('drop-target');
    });

    on(tbl,'drop',function(e){
      if(!DS.active)return;
      var td=e.target.closest('td');
      if(!td)return;
      var oid=parseInt(td.dataset.oid);
      if(oid!==DS.oid)return;
      var wdIdx=parseInt(td.dataset.wdIdx);
      if(wdIdx<0)return;
      e.preventDefault();
      applyMove(DS.oid,wdIdx,DS.lineKey);
      DS.active=false;DS.oid=null;DS.offset=0;DS.lineKey=null;
      document.querySelectorAll('.drop-target').forEach(function(r){r.classList.remove('drop-target');});
      render();
    });

    on(tbl,'dragend',function(){
      DS.active=false;DS.oid=null;DS.offset=0;
      document.querySelectorAll('.dragging-bar').forEach(function(b){b.classList.remove('dragging-bar');});
      document.querySelectorAll('.drop-target').forEach(function(r){r.classList.remove('drop-target');});
    });
  }

  scroll.appendChild(tbl);outer.appendChild(scroll);cont.appendChild(outer);
}

function parseCSV(text){
  // Remove BOM
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  var lines=text.split(/\r?\n/),rows=[];
  for(var i=1;i<lines.length;i++){
    var line=lines[i].trim();if(!line)continue;
    var cols=[],cur='',inQ=false;
    for(var j=0;j<line.length;j++){
      var ch=line[j];
      if(ch==='"'){if(inQ&&line[j+1]==='"'){cur+='"';j++;}else inQ=!inQ;}
      else if(ch===','&&!inQ){cols.push(cur);cur='';}
      else cur+=ch;
    }
    cols.push(cur);
    rows.push(cols);
  }
  return rows;
}

function showPreview(rows,container){
  container.innerHTML='';
  if(!rows||!rows.length){container.textContent='データが見つかりませんでした';return;}
  var info=el('div','');info.style.cssText='font-size:12px;font-weight:600;color:var(--pr);margin-bottom:8px';
  info.textContent=rows.length+'行 取込予定';container.appendChild(info);
  rows.slice(0,8).forEach(function(row){
    var line=el('div','');line.style.cssText='border-bottom:1px solid var(--bd);padding:3px 0;font-size:11px;color:var(--tx2)';
    line.textContent='['+String(row[0]||'').substring(0,6)+'] '+String(row[1]||'').substring(0,30)+(row[1]&&row[1].length>30?'…':'')+' / 数量:'+String(row[3]||'-');
    container.appendChild(line);
  });
  if(rows.length>8){var more=el('div','');more.style.cssText='font-size:11px;color:var(--tx3);margin-top:4px';more.textContent='… 他'+(rows.length-8)+'件';container.appendChild(more);}
}

function saveSchedules() {
  if (!window._fbDb) return;
  fbSave('appdata', 'schedules', {data: JSON.stringify(G.mSched), ts: Date.now()});
}

function saveCapacity() {
  if (!window._fbDb) return;
  fbSave('appdata', 'capacity', {data: JSON.stringify(G.capMap), capDefault: G.capDefault, holidays: JSON.stringify(G.holidays), ts: Date.now()});
}

// ── Sync: listen from Firestore (real-time) ──
window._startSync = function() {
  var db2 = window._fbDb, fns = window._fbFns;
  if (!db2 || !fns) return;

  // Listen to orders collection
  _unsubOrders = fns.onSnapshot(fns.collection(db2, 'orders'), function(snap) {
    if (snap.empty) {
      // First time: upload default data
      saveAllOrders();
      return;
    }
    var newOrders = [];
    snap.forEach(function(d) { newOrders.push(d.data()); });
    // Sort by rank
    newOrders.sort(function(a,b){ return (a.rank||999)-(b.rank||999); });
    G.orders = newOrders;
    if (window._fbAppReady) render();
  });

  // Listen to appdata (schedules + capacity)
  _unsubSched = fns.onSnapshot(fns.doc(db2, 'appdata', 'schedules'), function(snap) {
    if (snap.exists()) {
      try { G.mSched = JSON.parse(snap.data().data || '{}'); } catch(e){}
    }
    if (window._fbAppReady) render();
  });

  _unsubSched = fns.onSnapshot(fns.doc(db2, 'appdata', 'capacity'), function(snap) {
    if (snap.exists()) {
      try {
        var d = snap.data();
        G.capMap = JSON.parse(d.data || '{}');
        G.capDefault = d.capDefault || 1000;
        G.holidays = JSON.parse(d.holidays || '{}');
      } catch(e){}
    }
    if (window._fbAppReady) render();
  });

  // Set current user and show app
  G.u = window._currentFbUser;
  G.view = 'app';
  window._fbAppReady = true;
  document.getElementById('fb-loading').style.display = 'none';
  document.getElementById('R').style.display = 'block';
  render();
};

window._stopSync = function() {
  if (_unsubOrders) { _unsubOrders(); _unsubOrders = null; }
  if (_unsubSched)  { _unsubSched();  _unsubSched  = null; }
  window._fbAppReady = false;
  document.getElementById('fb-loading').style.display = 'none';
  document.getElementById('R').style.display = 'block';
  render();
};

// ── Override render to auto-save on state changes ──
var _origRender = render;
var _lastSaveState = '';
function render() {
  _origRender();
  // Auto-save if data changed (debounced)
  if (window._fbAppReady && G.u) {
    clearTimeout(window._saveTimer);
    window._saveTimer = setTimeout(function() {
      var state = JSON.stringify({
        orders: G.orders.map(function(o){return {id:o.id,rank:o.rank,st:o.st,bo:o.bo};}),
        mSched: G.mSched,
        capMap: G.capMap,
        capDefault: G.capDefault,
        holidays: G.holidays
      });
      if (state !== _lastSaveState) {
        _lastSaveState = state;
        saveAllOrders();
        saveSchedules();
        saveCapacity();
      }
    }, 800);
  }
}

// ── Override login/logout ──
// The original aLogin uses G.users array — replace with Firebase Auth
var _origALogin = aLogin;
aLogin = function() {
  var isReg = G.lm === 'register';
  var err = function() { return document.getElementById('le'); };

  if (!isReg) {
    // LOGIN
    var go = function() {
      var email = document.getElementById('li') ? document.getElementById('li').value.trim() : '';
      var pw = document.getElementById('lp') ? document.getElementById('lp').value : '';
      if (!email || !pw) { err().textContent = 'メールアドレスとパスワードを入力してください'; return; }
      err().textContent = '認証中...'; err().style.color = 'var(--tx2)';
      window._fbFns.signInWithEmailAndPassword(window._fbAuth, email, pw)
        .then(function() { /* onAuthStateChanged handles the rest */ })
        .catch(function(e) {
          err().style.color = 'var(--ng)';
          err().textContent = 'メールアドレスまたはパスワードが違います';
        });
    };
    var btn = document.getElementById('dologin');
    var pwi = document.getElementById('lp');
    if (btn) btn.onclick = go;
    if (pwi) pwi.onkeydown = function(e){ if(e.key==='Enter') go(); };
    var toR = document.getElementById('toR');
    if (toR) toR.onclick = function(){ G.lm='register'; render(); };
  } else {
    // REGISTER
    document.getElementById('doreg').onclick = function() {
      var co = document.getElementById('rc').value.trim();
      var email = document.getElementById('ri').value.trim();
      var pw = document.getElementById('rp').value;
      var pw2 = document.getElementById('rp2').value;
      var er = err();
      if (!co||!email||!pw) { er.textContent='全項目を入力してください'; return; }
      if (pw !== pw2) { er.textContent='パスワードが一致しません'; return; }
      if (pw.length < 6) { er.textContent='パスワードは6文字以上'; return; }
      er.textContent='登録中...'; er.style.color='var(--tx2)';
      window._fbFns.createUserWithEmailAndPassword(window._fbAuth, email, pw)
        .then(function(cred) {
          // Save user profile to Firestore
          // Determine role: first user or specific email = admin
          var role = 'client';
          // Save to Firestore users collection
          return window._fbFns.setDoc(
            window._fbFns.doc(window._fbDb, 'users', cred.user.uid),
            {co: co, role: role, email: email, createdAt: Date.now()}
          );
        })
        .then(function() {
          er.style.color='var(--ok)'; er.textContent='登録完了！';
        })
        .catch(function(e) {
          er.style.color='var(--ng)';
          if (e.code==='auth/email-already-in-use') er.textContent='このメールアドレスは既に使用されています';
          else if (e.code==='auth/invalid-email') er.textContent='メールアドレスの形式が正しくありません';
          else er.textContent='登録エラー: '+e.message;
        });
    };
    var toL = document.getElementById('toL');
    if (toL) toL.onclick = function(){ G.lm='login'; render(); };
  }
};

// Override logout
var _origLgout = null;
var _aAppOrig = aApp;
aApp = function() {
  _aAppOrig();
  var lgout = document.getElementById('lgout');
  if (lgout) lgout.onclick = function() {
    window._fbFns.signOut(window._fbAuth).then(function() {
      G.u = null; G.view = 'login'; window._fbAppReady = false; render();
    });
  };
};

// ── Add sync indicator to header ──
var _origRApp = rApp;
rApp = function() {
  var html = _origRApp();
  return html.replace(
    '<span class="ubadge">'+G.u.co+'</span>',
    '<span class="sync-dot"></span><span class="ubadge">'+G.u.co+'</span>'
  );
};

// ── canSee: use Firebase user ──
canSee = function(u, o) {
  if (!u) return false;
  if (u.role === 'admin') return true;
  return o.cl === u.co;
};

// ── Initial check: wait for Firebase ready ──
var _checkInterval = setInterval(function() {
  if (window._fbReady) {
    clearInterval(_checkInterval);
    // If already logged in, onAuthStateChanged will trigger
    // If not, show login after short delay
    setTimeout(function() {
      if (!window._fbAppReady) {
        document.getElementById('fb-loading').style.display = 'none';
        document.getElementById('R').style.display = 'block';
        G.view = 'login';
        render();
      }
    }, 2000);
  }
}, 100);

// ── Admin setup: register admin user in Firestore ──
// Run once to set admin role for a specific user
window.setAdminRole = function(uid) {
  if (!window._fbDb) return;
  window._fbFns.setDoc(
    window._fbFns.doc(window._fbDb, 'users', uid),
    {role: 'admin', co: '管理者'},
    {merge: true}
  ).then(function(){ alert('管理者権限を設定しました。再ログインしてください。'); });
};
